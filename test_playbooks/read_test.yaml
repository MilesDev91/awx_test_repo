---
- name: Read-only 834
  hosts: all
  gather_facts: false
  connection: ansible.netcommon.network_cli
  tasks:
    - name: Run show version
      cisco.ios.ios_command:
        commands:
          - show version
      register: show_ver
        
    - name: Print version summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "{{ show_ver.stdout[0] }}"